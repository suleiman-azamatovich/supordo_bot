services:
  postgres:
    image: postgres:16-alpine
    container_name: subordo_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subordo_bot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
